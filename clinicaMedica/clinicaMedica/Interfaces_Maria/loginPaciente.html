<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0   " />
  <link rel="stylesheet" href="style2.css" />
  <title>Login</title>
</head>
<body class="body">
  <main class="container">
    <nav>       
      <h1 class="title">Faça seu Login Aqui!</h1>
    </nav>
    <form id="formLoginPaciente">
      <div class="row">
        <div class="inputdiv">
          <input id="email" type="email" required />
          <label for="email">Email</label>
        </div>
        <div class="inputdiv">
          <input id="Senha" type="password" required />
          <label for="Senha">Senha</label>
        </div>
      </div>
      <div class="row" style="justify-content: center; margin-top: 40px;">
        <button class="button" id="btnLogin">Entrar</button>
      </div>
      <div class="row" style="justify-content: center; margin-top: 20px;">
        <a href="cadastroPaciente.html" class="link">Não tem uma conta? Cadastre-se</a>
      </div>
    </form>
  </main>
</body>
</html>
