<body class="body">

        <div class="inputdiv">

          <input id="Senha" type="password" required />

        </div>
      </div>
            <div style="width: 100%; display: flex; justify-content: center; margin-top: 40px;">
        <button class="button" id="btlogin">Entrar</button>
      </div>

      <div class="loginlink" style="margin-top: 10px;">
        <p>Não tem uma conta? <a href="cadastroPaciente.html">Cadastre-se!</a></p>
      </div>
  </main>
